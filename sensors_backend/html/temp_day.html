<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Temp daily</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
      h1 { margin: 0 0 12px 0; }
      #status { color: #444; margin: 8px 0 16px 0; }
      .device { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
      .muted { color: #666; font-size: 12px; }
      .err { color: #b00020; }
      .box { border: 1px solid #ddd; border-radius: 10px; padding: 12px 14px; max-width: 520px; }
      .row { display: flex; align-items: center; gap: 10px; margin: 10px 0 14px 0; }
      input[type="date"] { padding: 6px 8px; }
      button { padding: 6px 10px; border: 1px solid #ddd; background: #f7f7f7; border-radius: 8px; cursor: pointer; }
      button:hover { background: #f0f0f0; }
      canvas { border: 1px solid #eee; border-radius: 10px; background: #fff; }
      h2.chart-section { margin-top: 28px; }
    </style>
  </head>
  <body>
    <h1>Temp daily</h1>
    <div id="status" class="muted">Loading devices…</div>

    <div class="row">
      <label for="day"><b>Day</b></label>
      <button id="prevDay" type="button" title="Previous day">◀</button>
      <input id="day" type="date" />
      <button id="nextDay" type="button" title="Next day">▶</button>
      <a href="/" class="muted" style="margin-left: 10px;">Back</a>
    </div>

    <div class="box">
      <div class="muted" style="margin-bottom: 8px;"><b>Devices</b></div>
      <div id="devices"></div>
    </div>

    <h2 class="chart-section">Temperatures</h2>
    <canvas id="chartTemp" width="980" height="360"></canvas>

    <h2 class="chart-section">Humidity</h2>
    <canvas id="chartHumidity" width="980" height="360"></canvas>

    <script>
      let devicesById = new Map(); // id -> {id,name}
      let tempDayData = null;      // response from /api/temp_day
      let hoverTempMs = null;
      let hoverHumMs = null;

      function todayIso() {
        const d = new Date();
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function isoToLocalDate(iso) {
        const [y, m, d] = iso.split("-").map(n => parseInt(n, 10));
        return new Date(y, m - 1, d);
      }

      function localDateToIso(d) {
        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function shiftDay(deltaDays) {
        const dayEl = document.getElementById("day");
        const cur = dayEl.value || todayIso();
        const d = isoToLocalDate(cur);
        d.setDate(d.getDate() + deltaDays);
        dayEl.value = localDateToIso(d);
        fetchTempDay();
      }

      function getSelectedSensorIds() {
        const cbs = document.querySelectorAll('#devices input[type="checkbox"]');
        const ids = [];
        for (const cb of cbs) {
          if (cb.checked) ids.push(parseInt(cb.value, 10));
        }
        ids.sort((a, b) => a - b);
        return ids;
      }

      function paletteColor(i) {
        const colors = ["#1976d2", "#d32f2f", "#388e3c", "#f57c00", "#7b1fa2", "#00796b", "#5d4037", "#455a64"];
        return colors[i % colors.length];
      }

      function dayBoundsMs(isoDay) {
        const [y, m, d] = isoDay.split("-").map(n => parseInt(n, 10));
        const start = new Date(y, m - 1, d, 0, 0, 0, 0).getTime();
        const end = new Date(y, m - 1, d + 1, 0, 0, 0, 0).getTime();
        return { start, end, span: end - start };
      }

      function timeMsFromMouseFrac(frac) {
        const iso = document.getElementById("day").value;
        const { start, span } = dayBoundsMs(iso);
        return start + frac * span;
      }

      function xForTimeMs(canvas, tMs) {
        const { left, w } = chartGeometry(canvas);
        const iso = document.getElementById("day").value;
        const { start, span } = dayBoundsMs(iso);
        return left + ((tMs - start) / span) * w;
      }

      function formatTimeLabel(tMs) {
        return new Date(tMs).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
      }

      function nearestPoint(series, timeMs) {
        const pts = series.points || [];
        if (!pts.length) return null;
        let best = null;
        let bestD = Infinity;
        for (const p of pts) {
          const tm = Date.parse(p.ts);
          if (Number.isNaN(tm)) continue;
          const d = Math.abs(tm - timeMs);
          if (d < bestD) {
            bestD = d;
            best = p;
          }
        }
        return best;
      }

      function chartGeometry(canvas) {
        const left = 50, right = 20, top = 15, bottom = 30;
        const w = canvas.width - left - right;
        const h = canvas.height - top - bottom;
        return { left, right, top, bottom, w, h };
      }

      /** Cubic Béziers approximating Catmull–Rom; k larger = gentler curves. */
      function strokeSmoothLineThroughPoints(ctx, points, k = 6) {
        const n = points.length;
        if (n === 0) return;
        if (n === 1) {
          ctx.moveTo(points[0].x, points[0].y);
          return;
        }
        if (n === 2) {
          ctx.moveTo(points[0].x, points[0].y);
          ctx.lineTo(points[1].x, points[1].y);
          return;
        }
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 0; i < n - 1; i++) {
          const p0 = i > 0 ? points[i - 1] : points[i];
          const p1 = points[i];
          const p2 = points[i + 1];
          const p3 = i < n - 2 ? points[i + 2] : points[i + 1];
          const cp1x = p1.x + (p2.x - p0.x) / k;
          const cp1y = p1.y + (p2.y - p0.y) / k;
          const cp2x = p2.x - (p3.x - p1.x) / k;
          const cp2y = p2.y - (p3.y - p1.y) / k;
          ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, p2.x, p2.y);
        }
      }

      function visibleSeries() {
        if (!tempDayData || !tempDayData.series) return [];
        const selected = new Set(getSelectedSensorIds());
        return tempDayData.series.filter(s => selected.has(s.sensor_id));
      }

      function niceSensorLabel(s) {
        return s.name ? `${s.sensor_id} — ${s.name}` : String(s.sensor_id);
      }

      function roundedRectPath(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function drawTooltip(ctx, canvas, tMs, series, metric) {
        if (tMs === null || tMs === undefined) return;
        const geom = chartGeometry(canvas);
        const x = xForTimeMs(canvas, tMs);

        ctx.save();
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, geom.top);
        ctx.lineTo(x, geom.top + geom.h);
        ctx.stroke();

        const timeLabel = formatTimeLabel(tMs);
        const lines = [];
        for (let i = 0; i < series.length; i++) {
          const s = series[i];
          const p = nearestPoint(s, tMs);
          if (!p) continue;
          if (metric === "temp") {
            if (p.temp === null || p.temp === undefined) continue;
            const n = Number(p.temp);
            if (Number.isNaN(n)) continue;
            lines.push({ color: paletteColor(i), label: niceSensorLabel(s), value: `${n.toFixed(2)} °C` });
          } else {
            if (p.humidity === null || p.humidity === undefined) continue;
            const n = Number(p.humidity);
            if (Number.isNaN(n)) continue;
            lines.push({ color: paletteColor(i), label: niceSensorLabel(s), value: `${Math.round(n)}% RH` });
          }
        }

        const header = `Time ${timeLabel}`;
        const font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        ctx.font = font;

        let width = ctx.measureText(header).width;
        for (const l of lines) {
          width = Math.max(width, ctx.measureText(`${l.label}  ${l.value}`).width + 18);
        }
        width = Math.min(width + 16, 380);

        const height = 24 + lines.length * 16 + 10;
        let bx = x + 10;
        let by = geom.top + 10;
        if (bx + width > canvas.width - 10) bx = x - width - 10;

        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.strokeStyle = "rgba(0,0,0,0.15)";
        ctx.lineWidth = 1;
        roundedRectPath(ctx, bx, by, width, height, 8);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#111";
        ctx.fillText(header, bx + 10, by + 18);

        let y = by + 36;
        for (const l of lines) {
          ctx.fillStyle = l.color;
          ctx.fillRect(bx + 10, y - 10, 10, 10);
          ctx.fillStyle = "#111";
          ctx.fillText(l.label, bx + 26, y - 1);
          ctx.fillStyle = "#555";
          const valW = ctx.measureText(l.value).width;
          ctx.fillText(l.value, bx + width - 10 - valW, y - 1);
          y += 16;
        }

        ctx.restore();
      }

      function valueFromPoint(p, metric) {
        if (metric === "temp") {
          if (p.temp === null || p.temp === undefined) return NaN;
          return Number(p.temp);
        }
        if (p.humidity === null || p.humidity === undefined) return NaN;
        return Number(p.humidity);
      }

      function drawSingleChart(canvasId, metric, hoverMs) {
        const canvas = document.getElementById(canvasId);
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!tempDayData || !tempDayData.series) {
          ctx.fillStyle = "#666";
          ctx.fillText("No data loaded.", 10, 20);
          return;
        }

        const series = visibleSeries();
        const { left, top, w, h } = chartGeometry(canvas);

        let minY = Infinity, maxY = -Infinity;
        for (const s of series) {
          for (const p of (s.points || [])) {
            const n = valueFromPoint(p, metric);
            if (Number.isNaN(n)) continue;
            minY = Math.min(minY, n);
            maxY = Math.max(maxY, n);
          }
        }
        if (!isFinite(minY) || !isFinite(maxY)) {
          ctx.fillStyle = "#666";
          ctx.fillText(
            metric === "temp"
              ? "Select at least one sensor with temperature data."
              : "Select at least one sensor with humidity data.",
            10,
            20
          );
          return;
        }
        if (minY === maxY) {
          const d = metric === "temp" ? 1 : 5;
          minY -= d;
          maxY += d;
        }
        const pad = (maxY - minY) * 0.1;
        minY -= pad;
        maxY += pad;

        if (metric === "temp") {
          const range = maxY - minY;
          if (range < 2) {
            const mid = (minY + maxY) / 2;
            minY = mid - 1;
            maxY = mid + 1;
          }
        }
        if (metric === "humidity") {
          minY = Math.min(30, minY);
          maxY = Math.max(80, maxY);
        }

        function yFor(v) { return top + (1 - (v - minY) / (maxY - minY)) * h; }

        ctx.strokeStyle = "#eee";
        ctx.lineWidth = 1;
        for (let i = 0; i <= 24; i++) {
          const x = left + (i / 24) * w;
          ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, top + h); ctx.stroke();
        }
        for (let i = 0; i <= 5; i++) {
          const y = top + (i / 5) * h;
          ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(left + w, y); ctx.stroke();
        }

        ctx.strokeStyle = "#bbb";
        ctx.beginPath();
        ctx.moveTo(left, top);
        ctx.lineTo(left, top + h);
        ctx.lineTo(left + w, top + h);
        ctx.stroke();

        ctx.fillStyle = "#444";
        ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        const yFmt = metric === "temp" ? (v) => v.toFixed(1) : (v) => String(Math.round(v));
        for (let i = 0; i <= 5; i++) {
          const v = maxY - (i / 5) * (maxY - minY);
          const y = top + (i / 5) * h;
          ctx.fillText(yFmt(v), 8, y + 4);
        }

        for (let i = 0; i <= 24; i += 3) {
          const x = left + (i / 24) * w;
          const label = String(i).padStart(2, "0") + ":00";
          ctx.fillText(label, x - 14, top + h + 20);
        }

        const dayIso = document.getElementById("day").value;
        const { start: dayStart, span: daySpan } = dayBoundsMs(dayIso);

        series.forEach((s, idx) => {
          ctx.strokeStyle = paletteColor(idx);
          ctx.lineWidth = 2;
          ctx.beginPath();
          const pts = [...(s.points || [])];
          pts.sort((a, b) => Date.parse(a.ts) - Date.parse(b.ts));
          let seg = [];
          const flushSeg = () => {
            if (seg.length) strokeSmoothLineThroughPoints(ctx, seg);
            seg = [];
          };
          for (const p of pts) {
            const n = valueFromPoint(p, metric);
            if (Number.isNaN(n)) {
              flushSeg();
              continue;
            }
            const tMs = Date.parse(p.ts);
            if (Number.isNaN(tMs)) {
              flushSeg();
              continue;
            }
            const x = left + ((tMs - dayStart) / daySpan) * w;
            const y = yFor(n);
            seg.push({ x, y });
          }
          flushSeg();
          ctx.stroke();
        });

        let lx = left + 8, ly = top + 8;
        series.forEach((s, idx) => {
          ctx.fillStyle = paletteColor(idx);
          ctx.fillRect(lx, ly - 10, 10, 10);
          ctx.fillStyle = "#222";
          ctx.fillText(niceSensorLabel(s), lx + 14, ly - 1);
          ly += 16;
          if (ly > top + h - 10) { ly = top + 8; lx += 180; }
        });

        if (hoverMs !== null) drawTooltip(ctx, canvas, hoverMs, series, metric);
      }

      function drawCharts() {
        drawSingleChart("chartTemp", "temp", hoverTempMs);
        drawSingleChart("chartHumidity", "humidity", hoverHumMs);
      }

      async function fetchTempDay() {
        const dayEl = document.getElementById("day");
        const day = dayEl.value;
        try {
          const resp = await fetch("/api/temp_day", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ day }),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(JSON.stringify(data));
          tempDayData = data;
          const statusEl = document.getElementById("status");
          if (statusEl.textContent.startsWith("Failed to load day data:")) {
            const n = document.querySelectorAll('#devices input[type="checkbox"]').length;
            statusEl.textContent = `Loaded ${n} device(s).`;
          }
          statusEl.classList.remove("err");
          drawCharts();
        } catch (e) {
          const statusEl = document.getElementById("status");
          statusEl.textContent = "Failed to load day data: " + e;
          statusEl.classList.add("err");
        }
      }

      async function loadDevices() {
        const statusEl = document.getElementById("status");
        const devicesEl = document.getElementById("devices");
        devicesEl.innerHTML = "";
        try {
          const resp = await fetch("/api/devices", { headers: { "Accept": "application/json" } });
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          const devices = await resp.json();
          statusEl.textContent = `Loaded ${devices.length} device(s).`;
          statusEl.classList.remove("err");

          let lowestId = null;
          for (const d of devices) {
            const id = d.id;
            const name = d.name ?? "";
            const labelText = name ? `${id} — ${name}` : `${id}`;

            const row = document.createElement("div");
            row.className = "device";

            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.id = `dev_${id}`;
            cb.value = String(id);
            cb.addEventListener("change", drawCharts);

            const label = document.createElement("label");
            label.htmlFor = cb.id;
            label.textContent = labelText;

            row.appendChild(cb);
            row.appendChild(label);
            devicesEl.appendChild(row);

            if (lowestId === null || id < lowestId) lowestId = id;
            devicesById.set(id, { id, name });
          }

          if (lowestId !== null) {
            const firstCb = document.getElementById(`dev_${lowestId}`);
            if (firstCb) firstCb.checked = true;
            await fetchTempDay();
          }
        } catch (e) {
          statusEl.textContent = "Failed to load devices: " + e;
          statusEl.classList.add("err");
        }
      }

      const dayEl = document.getElementById("day");
      dayEl.value = todayIso();
      dayEl.addEventListener("change", fetchTempDay);
      document.getElementById("prevDay").addEventListener("click", () => shiftDay(-1));
      document.getElementById("nextDay").addEventListener("click", () => shiftDay(1));

      function attachChartInteractions(canvasId, metric) {
        const canvas = document.getElementById(canvasId);

        canvas.addEventListener("mousemove", (ev) => {
          if (!tempDayData || !tempDayData.series) return;
          const rect = canvas.getBoundingClientRect();
          const x = ev.clientX - rect.left;
          const { left, w } = chartGeometry(canvas);
          const xCanvas = (x / rect.width) * canvas.width;
          if (xCanvas < left || xCanvas > left + w) {
            if (metric === "temp") hoverTempMs = null;
            else hoverHumMs = null;
            drawCharts();
            return;
          }
          const frac = (xCanvas - left) / w;
          const tMs = timeMsFromMouseFrac(frac);
          if (metric === "temp") hoverTempMs = tMs;
          else hoverHumMs = tMs;
          drawCharts();
        });

        canvas.addEventListener("mouseleave", () => {
          if (metric === "temp") hoverTempMs = null;
          else hoverHumMs = null;
          drawCharts();
        });
      }

      attachChartInteractions("chartTemp", "temp");
      attachChartInteractions("chartHumidity", "humidity");

      loadDevices();
    </script>
  </body>
</html>
