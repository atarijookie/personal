<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Temp yearly</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 24px; }
      .muted { color: #666; }
      .row { display: flex; align-items: center; gap: 10px; margin: 10px 0 14px 0; flex-wrap: wrap; }
      input[type="number"] { padding: 6px 8px; width: 100px; }
      button { padding: 6px 10px; border: 1px solid #ddd; background: #f7f7f7; border-radius: 8px; cursor: pointer; }
      button:hover { background: #f0f0f0; }
      .box { border: 1px solid #ddd; border-radius: 10px; padding: 12px 14px; max-width: 520px; }
      .device { display: flex; align-items: center; gap: 10px; padding: 6px 0; }
      canvas { border: 1px solid #eee; border-radius: 10px; background: #fff; }
      a { color: #1976d2; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <h1>Temp yearly</h1>
    <div class="row">
      <label for="year"><b>Year</b></label>
      <button id="prevYear" type="button" title="Previous year">◀</button>
      <input id="year" type="number" min="2000" max="2100" />
      <button id="nextYear" type="button" title="Next year">▶</button>
      <a href="/" class="muted" style="margin-left: 10px;">Back</a>
    </div>

    <div id="status" class="muted">Loading…</div>
    <div class="box">
      <div class="muted" style="margin-bottom: 8px;"><b>Devices</b></div>
      <div id="devices"></div>
    </div>

    <h2>Temperatures (monthly average)</h2>
    <canvas id="chart" width="980" height="360"></canvas>

    <script>
      let devicesById = new Map(); // id -> {id,name}
      let tempYearData = null;     // response from /api/temp_year
      let hoverIdx = null;         // 0..11

      function monthName(m) {
        const names = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return names[m - 1] || String(m);
      }

      function getSelectedSensorIds() {
        const cbs = document.querySelectorAll('#devices input[type="checkbox"]');
        const ids = [];
        for (const cb of cbs) if (cb.checked) ids.push(parseInt(cb.value, 10));
        ids.sort((a, b) => a - b);
        return ids;
      }

      function visibleSeries() {
        if (!tempYearData || !tempYearData.series) return [];
        const selected = new Set(getSelectedSensorIds());
        return tempYearData.series.filter(s => selected.has(s.sensor_id));
      }

      function paletteColor(i) {
        const colors = ["#1976d2", "#d32f2f", "#388e3c", "#f57c00", "#7b1fa2", "#00796b", "#5d4037", "#455a64"];
        return colors[i % colors.length];
      }

      function niceSensorLabel(s) {
        return s.name ? `${s.sensor_id} — ${s.name}` : String(s.sensor_id);
      }

      function chartGeometry(canvas) {
        const left = 50, right = 20, top = 15, bottom = 30;
        const w = canvas.width - left - right;
        const h = canvas.height - top - bottom;
        return { left, right, top, bottom, w, h };
      }

      function strokeSmoothLineThroughPoints(ctx, points) {
        if (!points || points.length === 0) return;
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
      }

      function roundedRectPath(ctx, x, y, w, h, r) {
        const rr = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + rr, y);
        ctx.arcTo(x + w, y, x + w, y + h, rr);
        ctx.arcTo(x + w, y + h, x, y + h, rr);
        ctx.arcTo(x, y + h, x, y, rr);
        ctx.arcTo(x, y, x + w, y, rr);
        ctx.closePath();
      }

      function toMonthArray(months) {
        const arr = new Array(12).fill(null);
        for (const ms of (months || [])) {
          const m = ms.month;
          if (m >= 1 && m <= 12) arr[m - 1] = ms;
        }
        return arr;
      }

      function drawTooltip(ctx, canvas, idx, series, xFor) {
        const geom = chartGeometry(canvas);
        const x = xFor(idx);

        ctx.save();
        ctx.strokeStyle = "rgba(0,0,0,0.25)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x, geom.top);
        ctx.lineTo(x, geom.top + geom.h);
        ctx.stroke();

        const header = `${monthName(idx + 1)}`;
        ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";

        const lines = [];
        for (let i = 0; i < series.length; i++) {
          const s = series[i];
          const ms = toMonthArray(s.months)[idx];
          if (!ms || ms.t_avg === null || ms.t_avg === undefined) continue;
          lines.push({ color: paletteColor(i), label: niceSensorLabel(s), value: `${Number(ms.t_avg).toFixed(2)} °C` });
        }

        let width = ctx.measureText(header).width;
        for (const l of lines) width = Math.max(width, ctx.measureText(`${l.label}  ${l.value}`).width + 18);
        width = Math.min(width + 16, 420);
        const height = 24 + lines.length * 16 + 10;
        let bx = x + 10;
        let by = geom.top + 10;
        if (bx + width > canvas.width - 10) bx = x - width - 10;

        ctx.fillStyle = "rgba(255,255,255,0.92)";
        ctx.strokeStyle = "rgba(0,0,0,0.15)";
        ctx.lineWidth = 1;
        roundedRectPath(ctx, bx, by, width, height, 8);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = "#111";
        ctx.fillText(header, bx + 10, by + 18);

        let y = by + 36;
        for (const l of lines) {
          ctx.fillStyle = l.color;
          ctx.fillRect(bx + 10, y - 10, 10, 10);
          ctx.fillStyle = "#111";
          ctx.fillText(l.label, bx + 26, y - 1);
          ctx.fillStyle = "#555";
          const valW = ctx.measureText(l.value).width;
          ctx.fillText(l.value, bx + width - 10 - valW, y - 1);
          y += 16;
        }
        ctx.restore();
      }

      function drawChart() {
        const canvas = document.getElementById("chart");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (!tempYearData || !tempYearData.series) {
          ctx.fillStyle = "#666";
          ctx.fillText("No data loaded.", 10, 20);
          return;
        }

        const series = visibleSeries();
        const { left, top, w, h } = chartGeometry(canvas);

        let minY = Infinity, maxY = -Infinity;
        for (const s of series) {
          const months = toMonthArray(s.months);
          for (const ms of months) {
            if (!ms || ms.t_avg === null || ms.t_avg === undefined) continue;
            minY = Math.min(minY, ms.t_avg);
            maxY = Math.max(maxY, ms.t_avg);
          }
        }
        if (!isFinite(minY) || !isFinite(maxY)) {
          ctx.fillStyle = "#666";
          ctx.fillText("Select at least one sensor with data.", 10, 20);
          return;
        }
        if (minY === maxY) { minY -= 1; maxY += 1; }
        const pad = (maxY - minY) * 0.1;
        minY -= pad; maxY += pad;

        function xFor(i) { return left + (i / 11) * w; }
        function yFor(v) { return top + (1 - (v - minY) / (maxY - minY)) * h; }

        ctx.strokeStyle = "#eee";
        ctx.lineWidth = 1;
        for (let i = 0; i < 12; i++) {
          const x = xFor(i);
          ctx.beginPath(); ctx.moveTo(x, top); ctx.lineTo(x, top + h); ctx.stroke();
        }
        for (let i = 0; i <= 5; i++) {
          const y = top + (i / 5) * h;
          ctx.beginPath(); ctx.moveTo(left, y); ctx.lineTo(left + w, y); ctx.stroke();
        }

        ctx.strokeStyle = "#bbb";
        ctx.beginPath();
        ctx.moveTo(left, top);
        ctx.lineTo(left, top + h);
        ctx.lineTo(left + w, top + h);
        ctx.stroke();

        ctx.fillStyle = "#444";
        ctx.font = "12px system-ui, -apple-system, Segoe UI, Roboto, Arial";
        for (let i = 0; i <= 5; i++) {
          const v = maxY - (i / 5) * (maxY - minY);
          const y = top + (i / 5) * h;
          ctx.fillText(v.toFixed(1), 8, y + 4);
        }

        for (let m = 1; m <= 12; m++) {
          const x = xFor(m - 1);
          ctx.fillText(monthName(m), x - 10, top + h + 20);
        }

        series.forEach((s, idx) => {
          const months = toMonthArray(s.months);
          ctx.strokeStyle = paletteColor(idx);
          ctx.lineWidth = 2;
          ctx.beginPath();
          let seg = [];
          const flushSeg = () => {
            if (seg.length) strokeSmoothLineThroughPoints(ctx, seg);
            seg = [];
          };
          for (let i = 0; i < 12; i++) {
            const ms = months[i];
            const v = ms ? ms.t_avg : null;
            if (v === null || v === undefined) {
              flushSeg();
              continue;
            }
            seg.push({ x: xFor(i), y: yFor(v) });
          }
          flushSeg();
          ctx.stroke();
        });

        let lx = left + 8, ly = top + 8;
        series.forEach((s, idx) => {
          ctx.fillStyle = paletteColor(idx);
          ctx.fillRect(lx, ly - 10, 10, 10);
          ctx.fillStyle = "#222";
          ctx.fillText(niceSensorLabel(s), lx + 14, ly - 1);
          ly += 16;
          if (ly > top + h - 10) { ly = top + 8; lx += 180; }
        });

        if (hoverIdx !== null) drawTooltip(ctx, canvas, hoverIdx, series, xFor);
      }

      function shiftYear(delta) {
        const yearEl = document.getElementById("year");
        yearEl.value = String(parseInt(yearEl.value, 10) + delta);
        fetchYear();
      }

      async function fetchYear() {
        const yearEl = document.getElementById("year");
        const year = parseInt(yearEl.value, 10);
        const statusEl = document.getElementById("status");

        statusEl.textContent = "Loading…";

        try {
          const resp = await fetch("/api/temp_year", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Accept": "application/json" },
            body: JSON.stringify({ year }),
          });
          const data = await resp.json();
          if (!resp.ok) throw new Error(JSON.stringify(data));

          tempYearData = data;
          statusEl.textContent = `Loaded ${((data.series || []).length)} sensor(s).`;
          drawChart();
        } catch (e) {
          statusEl.textContent = "Failed: " + e;
        }
      }

      async function loadDevices() {
        const statusEl = document.getElementById("status");
        const devicesEl = document.getElementById("devices");
        devicesEl.innerHTML = "";
        try {
          const resp = await fetch("/api/devices", { headers: { "Accept": "application/json" } });
          if (!resp.ok) throw new Error("HTTP " + resp.status);
          const devices = await resp.json();
          for (const d of devices) {
            const id = d.id;
            const name = d.name ?? "";
            const labelText = name ? `${id} — ${name}` : `${id}`;
            const row = document.createElement("div");
            row.className = "device";
            const cb = document.createElement("input");
            cb.type = "checkbox";
            cb.id = `dev_${id}`;
            cb.value = String(id);
            cb.checked = true;
            cb.addEventListener("change", drawChart);
            const label = document.createElement("label");
            label.htmlFor = cb.id;
            label.textContent = labelText;
            row.appendChild(cb);
            row.appendChild(label);
            devicesEl.appendChild(row);
            devicesById.set(id, { id, name });
          }
        } catch (e) {
          statusEl.textContent = "Failed to load devices: " + e;
        }
      }

      const now = new Date();
      document.getElementById("year").value = String(now.getFullYear());
      document.getElementById("year").addEventListener("change", fetchYear);
      document.getElementById("prevYear").addEventListener("click", () => shiftYear(-1));
      document.getElementById("nextYear").addEventListener("click", () => shiftYear(1));

      const canvas = document.getElementById("chart");
      canvas.addEventListener("mousemove", (ev) => {
        if (!tempYearData || !tempYearData.series) return;
        const rect = canvas.getBoundingClientRect();
        const x = ev.clientX - rect.left;
        const { left, w } = chartGeometry(canvas);
        const xCanvas = (x / rect.width) * canvas.width;
        if (xCanvas < left || xCanvas > left + w) {
          hoverIdx = null;
          drawChart();
          return;
        }
        const t = (xCanvas - left) / w;
        const idx = Math.max(0, Math.min(11, Math.round(t * 11)));
        hoverIdx = idx;
        drawChart();
      });

      canvas.addEventListener("mouseleave", () => {
        hoverIdx = null;
        drawChart();
      });

      (async () => {
        await loadDevices();
        await fetchYear();
      })();
    </script>
  </body>
</html>
